services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beeroklog
      POSTGRES_PASSWORD: beeroklog
      POSTGRES_DB: beeroklog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/beeroklog-photos;
      mc anonymous set download local/beeroklog-photos;
      exit 0;
      "

  api:
    build: .
    ports:
      - "8082:8080"
    depends_on:
      - postgres
      - minio
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://beeroklog:beeroklog@postgres:5432/beeroklog?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # Browser origins allowed to call the API (the web app). "*" is a
      # dev-friendly default; restrict to your web origin in production,
      # e.g. http://192.168.11.100:3005
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      # Google OAuth client IDs whose tokens are trusted (comma-separated:
      # iOS + web client IDs).
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: beeroklog-photos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"

volumes:
  pgdata:
  miniodata:
